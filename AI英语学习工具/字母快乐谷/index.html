<!-- 字母快乐谷 v9
  v9 修改清单（基于 v8）：
  1. 砍掉小写字母功能，只保留 26 大写
  2. 删除 LOWER_STROKES / LOWER_TALL / LOWER_DESC / STROKE_COUNTS_LOWER
  3. 删除 STROKE_STARTS_LOWER / KEYPOINTS_LOWER
  4. 删除 switchCase() 函数 + Tab HTML + Tab CSS
  5. 删除 currentCase 变量，所有路径直接用大写
  6. 状态栏 /52 → /26，勋章弹窗 /52 → /26
  7. 解锁条件改为 26 大写全部 >= 90
  8. 自动演示只演示大写字母
  9. JS 语法零错误（避免三元运算符残留、分号丢失）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>字母快乐谷 v9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-green: #58CC02;
    --brand-green-dark: #46A302;
    --bg-cream: #FAFAFA;
    --ink-primary: #0A0A0A;
    --ink-secondary: #5A5A5A;
    --accent-gold: #FFC800;
    --c0: #FFE5A0; --c1: #FFCB97; --c2: #FFB3BB; --c3: #BFE1FA; --c4: #D8C7EF;
    --c5: #B8E8E4; --c6: #FFCFA8; --c7: #FFB3B3; --c8: #C5DEF5; --c9: #B8E5C7;
    --shadow-soft: 0 6px 20px rgba(0,0,0,0.08);
    --shadow-card: 0 4px 16px rgba(0,0,0,0.10);
    --radius-btn: 24px;
    --radius-card: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-cream);
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    color: var(--ink-primary);
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(88,204,2,0.06) 2px, transparent 2px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 1;
  }
  .page.active { opacity: 1; pointer-events: all; }

  /* ===== STATUS BAR ===== */
  .status-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px 10px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(88,204,2,0.15);
    flex-shrink: 0;
    position: relative; z-index: 10;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 5px;
    background: white;
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 13px; font-weight: 700;
    box-shadow: var(--shadow-soft);
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.15s ease;
    flex: 1; justify-content: center;
  }
  .stat-pill:active { transform: scale(0.95); }
  .stat-pill .num { color: var(--brand-green); font-size: 15px; }
  .stat-pill.gold .num { color: var(--accent-gold); }
  .flame-level { font-size: 20px; animation: flicker 2s ease-in-out infinite alternate; }
  @keyframes flicker {
    from { transform: scale(1) rotate(-3deg); }
    to { transform: scale(1.1) rotate(3deg); }
  }

  /* ===== HOME ===== */
  .home-title {
    text-align: center;
    padding: 14px 16px 8px;
    flex-shrink: 0;
  }
  .home-title h1 {
    font-family: 'Archivo Black', 'Manrope', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    background: linear-gradient(135deg, #58CC02 0%, #FFC800 50%, #FF6B6B 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .home-title p { font-size: 12px; color: var(--ink-secondary); margin-top: 2px; }

  .letter-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding: 8px 12px 12px;
    overflow-y: auto;
    align-content: start;
  }
  .letter-btn {
    aspect-ratio: 1;
    border: none; border-radius: var(--radius-btn);
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 900;
    cursor: pointer;
    touch-action: manipulation;
    position: relative;
    box-shadow: var(--shadow-card);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    display: flex; align-items: center; justify-content: center;
    color: rgba(0,0,0,0.65);
    overflow: visible;
  }
  .letter-btn:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .letter-btn.locked { background: #E8E8E8 !important; color: #999; font-size: 20px; cursor: default; }
  .letter-btn.empty { background: transparent !important; box-shadow: none; cursor: default; }
  .letter-btn .star-badge {
    position: absolute; top: -4px; right: -2px;
    background: var(--accent-gold);
    color: white; font-size: 10px;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(255,200,0,0.5);
    animation: star-pop-badge 0.4s cubic-bezier(0.34,1.56,0.64,1);
    font-style: normal;
  }
  @keyframes star-pop-badge {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  /* ===== PAGE 2: DRAW ===== */
  .draw-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(88,204,2,0.15);
    flex-shrink: 0;
  }
  .btn-icon {
    background: white;
    border: none; border-radius: 16px;
    padding: 7px 10px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: var(--shadow-soft);
    display: flex; align-items: center; gap: 4px;
    transition: transform 0.15s ease;
    white-space: nowrap;
  }
  .btn-icon:active { transform: scale(0.93); }
  .draw-letter-label {
    flex: 1; text-align: center;
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px; font-weight: 900;
    color: var(--ink-primary);
  }

  /* Canvas area */
  .canvas-wrap {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: white;
    position: relative;
    overflow: hidden;
  }
  #drawCanvas {
    display: block;
    touch-action: none;
    cursor: crosshair;
    position: relative;
    z-index: 2;
  }

  .stroke-number-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  .stroke-mark {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 3px;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .stroke-label {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--brand-green);
    color: white;
    font-family: 'Manrope', 'Arial Black', sans-serif;
    font-weight: 900;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(88,204,2,0.4);
    pointer-events: none;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .stroke-mark.active .stroke-label { animation: pulse-label 1s ease-in-out infinite; }
  .stroke-mark.done .stroke-label {
    background: white;
    color: var(--brand-green);
    border: 2px solid var(--brand-green);
    font-size: 13px;
  }
  @keyframes pulse-label {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  .stroke-arrow {
    font-size: 13px;
    color: #58CC02;
    opacity: 0.85;
    display: inline-block;
    line-height: 1;
    flex-shrink: 0;
  }

  .stroke-progress {
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(88,204,2,0.15);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 700;
    color: var(--brand-green);
    pointer-events: none;
    z-index: 4;
  }

  .draw-footer {
    display: flex; gap: 10px;
    padding: 10px 16px 14px;
    background: rgba(255,255,255,0.95);
    border-top: 2px solid rgba(88,204,2,0.15);
    flex-shrink: 0;
  }
  .btn-main {
    flex: 1;
    padding: 14px;
    border: none; border-radius: var(--radius-btn);
    font-family: 'PingFang SC', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s ease;
    box-shadow: var(--shadow-card);
  }
  .btn-main:active { transform: scale(0.95); }
  .btn-main.primary { background: var(--brand-green); color: white; }
  .btn-main.primary:active { background: var(--brand-green-dark); }
  .btn-main.secondary { background: #F0F0F0; color: var(--ink-primary); }

  /* ===== PAGE 3: SCORE ===== */
  #p3 {
    background: linear-gradient(160deg, #f0fce8 0%, #fff9e6 60%, #fce8f0 100%);
    overflow-y: auto;
  }

  .score-header {
    text-align: center;
    padding: 14px 16px 6px;
    flex-shrink: 0;
  }

  .score-letter-display {
    font-family: 'Archivo Black', sans-serif;
    font-size: 48px; font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #58CC02, #FFC800, #FF6B6B, #58CC02);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: rainbow-shift 2s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes rainbow-shift {
    from { background-position: 0% center; }
    to { background-position: 200% center; }
  }

  .stars-row {
    display: flex; gap: 8px;
    justify-content: center;
    margin: 8px 0 16px;
  }
  .star {
    font-size: 56px;
    line-height: 1;
    display: inline-block;
  }
  .star.gold {
    color: #FFC800;
    filter: drop-shadow(0 4px 8px rgba(255,200,0,0.5));
    animation: starPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .star:nth-child(2).gold { animation-delay: 0.2s; }
  .star:nth-child(3).gold { animation-delay: 0.4s; }
  .star.gray { color: #D8D8D8; opacity: 0.5; }
  @keyframes starPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .score-big-emoji {
    font-size: 80px;
    display: block;
    text-align: center;
    animation: emoji-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.5s both;
    margin-bottom: 8px;
  }
  @keyframes emoji-pop {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  .flame-plus {
    display: inline-flex; align-items: center; gap: 6px;
    background: white;
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 16px; font-weight: 800;
    box-shadow: var(--shadow-soft);
    margin-bottom: 4px;
    animation: emoji-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
  }
  .flame-plus.hidden { display: none; }

  .char-bubble-wrap {
    display: flex; align-items: flex-start; justify-content: center;
    gap: 10px;
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .char-avatar {
    width: 56px; height: 56px;
    border-radius: 18px;
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
    animation: avatar-enter 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  @keyframes avatar-enter {
    from { transform: scale(0) rotate(-20deg); }
    to { transform: scale(1) rotate(0); }
  }
  .char-bubble {
    background: white;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 18px;
    font-size: 15px; font-weight: 600;
    color: var(--ink-primary);
    box-shadow: var(--shadow-card);
    max-width: 240px;
    line-height: 1.6;
    animation: bubble-enter 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
  }
  @keyframes bubble-enter {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .score-actions {
    display: flex; gap: 8px;
    padding: 8px 14px 20px;
    flex-shrink: 0;
    margin-top: auto;
  }
  .score-actions .btn-main { font-size: 14px; padding: 14px 8px; }

  /* ===== STAR PARTICLES ===== */
  .star-particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    animation: star-fly 1.2s ease-out forwards;
    z-index: 9999;
  }
  @keyframes star-fly {
    0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
    50% { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(180deg); }
    100% { transform: translate(calc(var(--dx)*1.5), calc(var(--dy)*2 + 80px)) scale(0.3) rotate(360deg); opacity: 0; }
  }

  /* ===== PAGE 4: UNLOCK ===== */
  #p4 {
    background: linear-gradient(160deg, #fff9e0 0%, #fffbe8 100%);
    overflow-y: auto;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
    padding: 30px 20px;
  }
  .unlock-ampersand {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(80px, 20vw, 140px);
    animation: rotate-gold 4s linear infinite;
    background: linear-gradient(135deg, #FFC800, #FF9500, #FFC800);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
    filter: drop-shadow(0 4px 20px rgba(255,200,0,0.4));
  }
  @keyframes rotate-gold {
    from { filter: drop-shadow(0 4px 20px rgba(255,200,0,0.4)) hue-rotate(0deg); }
    to { filter: drop-shadow(0 4px 20px rgba(255,200,0,0.4)) hue-rotate(30deg); }
  }
  .unlock-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(20px, 5vw, 28px);
    color: var(--ink-primary);
    line-height: 1.4;
  }
  .achievement-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; width: 100%; max-width: 340px;
  }
  .ach-card { background: white; border-radius: 16px; padding: 12px 8px; box-shadow: var(--shadow-soft); }
  .ach-num { font-family: 'Archivo Black', sans-serif; font-size: 24px; font-weight: 900; color: var(--brand-green); }
  .ach-label { font-size: 11px; color: var(--ink-secondary); font-weight: 600; }
  .confetti-piece {
    position: fixed; pointer-events: none;
    width: 10px; height: 10px; border-radius: 2px;
    animation: confetti-fall linear forwards;
    z-index: 9999;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== STATS POPUP ===== */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .popup-overlay.open { opacity: 1; pointer-events: all; }
  .popup-box {
    background: white;
    border-radius: 28px;
    padding: 24px 20px;
    width: min(90vw, 360px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: scale(0.9);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .popup-overlay.open .popup-box { transform: scale(1); }
  .popup-title { font-family: 'Archivo Black', sans-serif; font-size: 20px; text-align: center; margin-bottom: 16px; }
  .popup-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #F0F0F0;
    font-size: 14px;
  }
  .popup-row:last-child { border-bottom: none; }
  .popup-row .val { font-weight: 800; color: var(--brand-green); font-size: 18px; }
  .popup-close {
    display: block; width: 100%; margin-top: 16px;
    padding: 12px;
    background: var(--brand-green); color: white;
    border: none; border-radius: var(--radius-btn);
    font-size: 15px; font-weight: 700;
    cursor: pointer; touch-action: manipulation;
  }

  /* ===== DEMO BADGE ===== */
  .demo-badge {
    position: fixed; top: 12px; right: 12px;
    background: rgba(255,100,50,0.9);
    color: white; font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    z-index: 9998; letter-spacing: 0.5px;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(88,204,2,0.3); border-radius: 2px; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(10,10,10,0.85);
    color: white; padding: 10px 20px;
    border-radius: 999px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.3s ease;
    z-index: 9999; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .canvas-hint {
    position: absolute;
    bottom: 12px; left: 0; right: 0;
    text-align: center;
    font-size: 12px; color: rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- PAGE 1: HOME -->
<div class="page active" id="p1">
  <div class="status-bar">
    <div class="stat-pill" id="flameBtn">
      <span class="flame-level">&#128293;</span>
      <span>连胜</span>
      <span class="num" id="streakNum">0</span>
    </div>
    <div class="stat-pill">
      <span>&#11088;</span>
      <span class="num" id="unlockedNum">0</span>
      <span>/26</span>
    </div>
    <div class="stat-pill gold" id="medalBtn">
      <span>&#128202;</span>
      <span class="num">勋章</span>
    </div>
  </div>
  <div class="home-title">
    <h1>字母快乐谷</h1>
    <p>点击字母开始练习笔顺！</p>
  </div>
  <div class="letter-grid" id="letterGrid"></div>
</div>

<!-- PAGE 2: DRAW -->
<div class="page" id="p2">
  <div class="draw-header">
    <button class="btn-icon" onclick="goHome()">&#8592; 返回</button>
    <div class="draw-letter-label" id="drawLabel">A</div>
    <button class="btn-icon" onclick="speakLetter()">&#128266; 读音</button>
    <button class="btn-icon" onclick="playStrokeDemo()">&#128065; 示范</button>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="drawCanvas"></canvas>
    <div class="stroke-number-container" id="strokeNumberContainer"></div>
    <div class="stroke-progress" id="strokeProgress"></div>
    <div class="canvas-hint">沿灰色轮廓描画字母</div>
  </div>

  <div class="draw-footer">
    <button class="btn-main secondary" onclick="clearCanvas()">&#128260; 重画</button>
    <button class="btn-main primary" onclick="submitDrawing()">&#10003; 写好了</button>
  </div>
</div>

<!-- PAGE 3: SCORE -->
<div class="page" id="p3">
  <div class="score-header">
    <div class="score-letter-display" id="scoreLetterDisplay">A</div>
    <div class="stars-row" id="starsRow">
      <span class="star gray">&#9734;</span>
      <span class="star gray">&#9734;</span>
      <span class="star gray">&#9734;</span>
    </div>
    <span class="score-big-emoji" id="scoreBigEmoji">&#128526;</span>
    <div class="flame-plus hidden" id="flamePlus">
      <span>&#128293;</span><span>连胜 +1！</span>
    </div>
  </div>

  <div class="char-bubble-wrap">
    <div class="char-avatar" id="charAvatar">&#127280;</div>
    <div class="char-bubble" id="charBubble">哇！三角好尖呀！</div>
  </div>

  <div class="score-actions">
    <button class="btn-main secondary" onclick="retryLetter()">&#128260; 再写</button>
    <button class="btn-main primary" onclick="nextLetter()">&#10145; 下一个</button>
  </div>
</div>

<!-- PAGE 4: UNLOCK -->
<div class="page" id="p4">
  <div class="unlock-ampersand">&amp;</div>
  <div class="unlock-title">你打开了我！<br>你已经掌握所有字母！&#127881;</div>
  <div class="achievement-grid" id="achGrid">

function getStrokeDirectionAngle(pathStr) {
  try {
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    var pathEl = document.createElementNS(svgNS, 'path');
    svg.style.cssText = 'position:absolute;opacity:0;width:300px;height:300px;pointer-events:none';
    pathEl.setAttribute('d', pathStr);
    svg.appendChild(pathEl);
    document.body.appendChild(svg);
    var total = pathEl.getTotalLength();
    if (total < 1) { document.body.removeChild(svg); return 0; }
    var p0 = pathEl.getPointAtLength(0);
    var p1 = pathEl.getPointAtLength(Math.min(20, total * 0.15));
    document.body.removeChild(svg);
    return Math.atan2(p1.y - p0.y, p1.x - p0.x) * 180 / Math.PI;
  } catch(e) {
    return 0;
  }
}

var _strokeAngles = {};
function getStrokeAngles(letter) {
  var key = 'U' + letter;
  if (_strokeAngles[key]) return _strokeAngles[key];
  var strokes = UPPER_STROKES[letter.toUpperCase()] || [];
  _strokeAngles[key] = strokes.map(function(d) { return getStrokeDirectionAngle(d); });
  return _strokeAngles[key];
}

var canvas = document.getElementById('drawCanvas');
var ctx = canvas.getContext('2d');
var canvasSize = 300;
var dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  var wrap = document.getElementById('canvasWrap');
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  canvasSize = Math.min(w, h, 380);
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  canvas.width = canvasSize * dpr;
  canvas.height = canvasSize * dpr;
  ctx.scale(dpr, dpr);
  redrawCanvas();
}

function redrawCanvas() {
  ctx.clearRect(0, 0, canvasSize, canvasSize);
  drawGridLines();
  drawGuide();
  drawUserStrokes(false);
}

function drawGridLines() {
  var sc = canvasSize;
  var topY  = sc * 0.10;
  var dashY = sc * 0.367;
  var midY  = sc * 0.633;
  var botY  = sc * 0.90;

  ctx.save();
  ctx.strokeStyle = '#5A5A5A';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(sc*0.05, topY); ctx.lineTo(sc*0.95, topY); ctx.stroke();

  ctx.strokeStyle = '#A0A0A0';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(sc*0.05, dashY); ctx.lineTo(sc*0.95, dashY); ctx.stroke();

  ctx.strokeStyle = '#5A5A5A';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(sc*0.05, midY); ctx.lineTo(sc*0.95, midY); ctx.stroke();

  ctx.strokeStyle = '#5A5A5A';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(sc*0.05, botY); ctx.lineTo(sc*0.95, botY); ctx.stroke();

  ctx.restore();
}

function drawGuide() {
  var strokes = getCurrentStrokes();
  var svgNS = 'http://www.w3.org/2000/svg';

  var guideOverlay = document.getElementById('guideOverlay');
  if (!guideOverlay) {
    guideOverlay = document.createElementNS(svgNS, 'svg');
    guideOverlay.id = 'guideOverlay';
    guideOverlay.style.cssText = 'position:absolute;pointer-events:none;z-index:1;top:50%;left:50%;transform:translate(-50%,-50%)';
    var wrap = document.getElementById('canvasWrap');
    var cnv = document.getElementById('drawCanvas');
    if (wrap && cnv) wrap.insertBefore(guideOverlay, cnv);
    else if (wrap) wrap.appendChild(guideOverlay);
  }

  guideOverlay.setAttribute('width', canvasSize);
  guideOverlay.setAttribute('height', canvasSize);
  guideOverlay.setAttribute('viewBox', '0 0 300 300');
  guideOverlay.innerHTML = '';

  if (!strokes.length) return;

  strokes.forEach(function(d) {
    var pathEl = document.createElementNS(svgNS, 'path');
    pathEl.setAttribute('d', d);
    pathEl.setAttribute('stroke', 'rgba(0,0,0,0.15)');
    pathEl.setAttribute('stroke-width', '20');
    pathEl.setAttribute('stroke-linecap', 'round');
    pathEl.setAttribute('stroke-linejoin', 'round');
    pathEl.setAttribute('fill', 'none');
    guideOverlay.appendChild(pathEl);
  });
}

function drawUserStrokes(rainbow) {
  userStrokes.forEach(function(stroke) {
    if (!stroke.length) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 10;
    if (rainbow && stroke.length > 1) {
      var grad = ctx.createLinearGradient(stroke[0].x, stroke[0].y, stroke[stroke.length-1].x, stroke[stroke.length-1].y);
      grad.addColorStop(0, '#FF6B6B');
      grad.addColorStop(0.33, '#FFC800');
      grad.addColorStop(0.66, '#58CC02');
      grad.addColorStop(1, '#4ECDC4');
      ctx.strokeStyle = grad;
    } else {
      ctx.strokeStyle = '#58CC02';
    }
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    stroke.forEach(function(pt, i) { if(i>0) ctx.lineTo(pt.x, pt.y); });
    ctx.stroke();
    ctx.restore();
  });
}

  container.innerHTML = '';
  var key = currentLetter.toUpperCase();
  var starts = STROKE_STARTS_UPPER[key] || [];
  var sc = canvasSize / 300;
  var wrapRect = document.getElementById('canvasWrap').getBoundingClientRect();
  var canvasRect = canvas.getBoundingClientRect();
  var offsetX = canvasRect.left - wrapRect.left;
  var offsetY = canvasRect.top - wrapRect.top;

  var angles = getStrokeAngles(currentLetter);

  starts.forEach(function(pt, i) {
    var mark = document.createElement('div');
    mark.className = 'stroke-mark';
    mark.dataset.stroke = i;

    var labelEl = document.createElement('div');
    labelEl.className = 'stroke-label';
    labelEl.textContent = (i + 1).toString();

    var arrowEl = document.createElement('div');
    arrowEl.className = 'stroke-arrow';
    arrowEl.textContent = '→';
    var angle = (angles[i] !== undefined) ? angles[i] : 0;
    arrowEl.style.transform = 'rotate(' + angle + 'deg)';

    mark.appendChild(labelEl);
    mark.appendChild(arrowEl);

    var px = offsetX + pt.x * sc;
    var py = offsetY + pt.y * sc;
    mark.style.left = px + 'px';
    mark.style.top = py + 'px';

    if (i === 0) mark.classList.add('active');
    container.appendChild(mark);
  });
}

function updateStrokeLabels() {
  if (isDemoPlaying) return;
  var marks = document.querySelectorAll('.stroke-mark');
  var doneCount = userStrokes.filter(function(s) { return s.length > 2; }).length;
  marks.forEach(function(mark, i) {
    mark.classList.remove('active', 'done');
    var labelEl = mark.querySelector('.stroke-label');
    if (i < doneCount) {
      mark.classList.add('done');
      if (labelEl) labelEl.textContent = '✓';
    } else if (i === doneCount) {
      mark.classList.add('active');
      if (labelEl) labelEl.textContent = (i+1).toString();
    } else {
      if (labelEl) labelEl.textContent = (i+1).toString();
    }
  });
}

// =============================================
// POINTER EVENTS
// =============================================
canvas.addEventListener('pointerdown', function(e) {
  speechUnlocked = true;
  e.preventDefault();
  isDrawing = true;
  var pt = getCanvasPoint(e);
  currentStroke = [pt];
  userStrokes.push(currentStroke);
  updateStrokeCount();
  updateStrokeLabels();
});
canvas.addEventListener('pointermove', function(e) {
  if (!isDrawing || !currentStroke) return;
  e.preventDefault();
  currentStroke.push(getCanvasPoint(e));
  redrawCanvas();
});
canvas.addEventListener('pointerup', function(e) {
  e.preventDefault();
  isDrawing = false;
  currentStroke = null;
  updateStrokeLabels();
});
canvas.addEventListener('pointercancel', function() { isDrawing = false; currentStroke = null; });

function getCanvasPoint(e) {
  var rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function updateStrokeCount() {
  var expected = STROKE_COUNTS_UPPER[currentLetter] || 1;
  document.getElementById('strokeProgress').textContent = '笔画 ' + userStrokes.length + '/' + expected;
}

function clearCanvas() {
  demoTimeouts.forEach(function(t) { clearTimeout(t); });
  demoTimeouts = [];
  isDemoPlaying = false;
  userStrokes = [];
  currentStroke = null;
  isDrawing = false;
  redrawCanvas();
  updateStrokeCount();
  renderStrokeLabels();
}

// =============================================
// STROKE DEMO ANIMATION
// =============================================
var demoTimeouts = [];

function playStrokeDemo() {
  demoTimeouts.forEach(function(t) { clearTimeout(t); });
  demoTimeouts = [];
  clearCanvas();

  var strokes = getCurrentStrokes();
  if (!strokes.length) return;

  isDemoPlaying = true;
  userStrokes = [];
  var delay = 0;

  strokes.forEach(function(pathStr, strokeIdx) {
    var pts = samplePath(pathStr, 40);
    if (!pts.length) return;

    var t1 = setTimeout(function() {
      var stroke = [];
      userStrokes.push(stroke);
      var i = 0;
      function step() {
        if (i >= pts.length) {
          var marks = document.querySelectorAll('.stroke-mark');
          marks.forEach(function(m, li) {
            m.classList.remove('active', 'done');
            var labelEl = m.querySelector('.stroke-label');
            if (li <= strokeIdx) {
              m.classList.add('done');
              if (labelEl) labelEl.textContent = '✓';
            } else {
              if (labelEl) labelEl.textContent = (li + 1).toString();
            }
          });
          return;
        }
        stroke.push(pts[i]);
        i++;
        redrawCanvas();
        demoTimeouts.push(setTimeout(step, 18));
      }
      var marks = document.querySelectorAll('.stroke-mark');
      marks.forEach(function(m, li) {
        m.classList.remove('active','done');
        var labelEl = m.querySelector('.stroke-label');
        if (li < strokeIdx) {
          m.classList.add('done');
          if (labelEl) labelEl.textContent = '✓';
        } else if (li === strokeIdx) {
          m.classList.add('active');
        } else {
          if (labelEl) labelEl.textContent = (li+1).toString();
        }
      });
      step();
    }, delay);
    demoTimeouts.push(t1);
    delay += pts.length * 18 + 400;
  });

  var resetT = setTimeout(function() {
    isDemoPlaying = false;
    userStrokes = [];
    redrawCanvas();
    updateStrokeCount();
    var marks = document.querySelectorAll('.stroke-mark');
    marks.forEach(function(m, li) {
      m.classList.remove('active', 'done');
      var labelEl = m.querySelector('.stroke-label');
      if (labelEl) labelEl.textContent = (li + 1).toString();
      if (li === 0) m.classList.add('active');
    });
  }, delay + 500);
  demoTimeouts.push(resetT);
}

function samplePath(pathStr, numPts) {
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS, 'svg');
  var pathEl = document.createElementNS(svgNS, 'path');
  svg.style.cssText = 'position:absolute;opacity:0;width:300px;height:300px;pointer-events:none';
  pathEl.setAttribute('d', pathStr);
  svg.appendChild(pathEl);
  document.body.appendChild(svg);
  var total = pathEl.getTotalLength();
  var pts = [];
  var sc = canvasSize / 300;
  for (var i = 0; i <= numPts; i++) {
    var pt = pathEl.getPointAtLength((i/numPts) * total);
    pts.push({ x: pt.x * sc, y: pt.y * sc });
  }
  document.body.removeChild(svg);
  return pts;
}

function getCurrentStrokes() {
  return UPPER_STROKES[currentLetter.toUpperCase()] || [];
}

// =============================================
// HOME PAGE
// =============================================
function buildGrid() {
  var grid = document.getElementById('letterGrid');
  grid.innerHTML = '';
  LETTERS.forEach(function(letter, i) {
    var btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.style.background = 'var(' + CANDY_COLORS[i%10] + ')';
    btn.textContent = letter;
    btn.onclick = function() { startLetter(letter); };
    var best = state.bestScores[letter] || 0;
    if (best >= 90) {
      var star = document.createElement('span');
      star.className = 'star-badge';
      star.textContent = '★';
      btn.appendChild(star);
    }
    grid.appendChild(btn);
  });
  var locked = document.createElement('button');
  locked.className = 'letter-btn locked';
  locked.textContent = '🔒';
  locked.onclick = function() { showToast('完成所有字母后解锁 &'); };
  grid.appendChild(locked);
  var empty = document.createElement('button');
  empty.className = 'letter-btn empty';
  grid.appendChild(empty);
}

function updateStatusBar() {
  document.getElementById('streakNum').textContent = state.streak;
  var unlocked = LETTERS.reduce(function(cnt, l) {
    if ((state.bestScores[l.toUpperCase()] || 0) >= 90) cnt++;
    return cnt;
  }, 0);
  document.getElementById('unlockedNum').textContent = unlocked;
  var lvl = Math.floor(state.streak / 3);
  var flames = ['🔥','🔥🔥','🔥🔥🔥','🌋','☀️'];
  document.querySelector('.flame-level').textContent = flames[Math.min(lvl,4)];

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function goHome() {
  demoTimeouts.forEach(function(t) { clearTimeout(t); });
  demoTimeouts = [];
  buildGrid();
  updateStatusBar();

}

function startLetter(letter) {
  currentLetter = letter;
  userStrokes = [];
  speechUnlocked = false;

  document.getElementById('drawLabel').textContent = letter;

  showPage('p2');
  setTimeout(function() {
    resizeCanvas();
    clearCanvas();
    renderStrokeLabels();
    updateStrokeCount();
    setTimeout(function() { if(speechUnlocked) speakLetter(false); }, 400);
  }, 100);
}

// =============================================
// SPEECH
// =============================================
function speakLetter(auto) {
  if (auto && !speechUnlocked) return;
  speakLetterByName(currentLetter);
  speechUnlocked = true;
}

// =============================================
// SCORING
// =============================================
function submitDrawing() {
  if (!userStrokes.length || userStrokes.every(function(s) { return !s.length; })) {
    showToast('先画一下字母吧！');
    return;
  }
  var score = calculateScore();
  showScorePage(score);
}

function calculateScore() {
  var isMobile = 'ontouchstart' in window;
  var tolerance = isMobile ? 65 : 45;
  var allPts = [];
  userStrokes.forEach(function(s) { s.forEach(function(p) { allPts.push(p); }); });
  if (!allPts.length) return 0;
  var sc = canvasSize / 300;

  var expected = STROKE_COUNTS_UPPER[currentLetter] || 1;
  var actual = userStrokes.filter(function(s) { return s.length > 2; }).length;
  var strokeScore = (actual === expected) ? 25 : Math.max(0, 25 - Math.abs(actual-expected)*8);

  var kp = KEYPOINTS_UPPER[currentLetter];
  if (!kp) return 50;
  var expStart = { x: kp.start.x*sc, y: kp.start.y*sc };
  var startDist = Math.hypot(allPts[0].x - expStart.x, allPts[0].y - expStart.y);
  var startScore = Math.max(0, 25 - (startDist/tolerance)*25);

  var expEnd = { x: kp.end.x*sc, y: kp.end.y*sc };
  var actualEnd = allPts[allPts.length-1];
  var endDist = Math.hypot(actualEnd.x - expEnd.x, actualEnd.y - expEnd.y);
  var endScore = Math.max(0, 25 - (endDist/tolerance)*25);

  var strokes = getCurrentStrokes();
  var allGuidePts = [];
  strokes.forEach(function(d) { samplePath(d, 20).forEach(function(p) { allGuidePts.push(p); }); });
  var coverTol = 32 * sc;
  var covered = 0;
  allGuidePts.forEach(function(gp) {
    var found = false;
    allPts.forEach(function(up) { if (!found && Math.hypot(up.x-gp.x, up.y-gp.y) < coverTol) found = true; });
    if (found) covered++;
  });
  var coverScore = allGuidePts.length ? (covered/allGuidePts.length)*25 : 0;

  return Math.round(strokeScore + startScore + endScore + coverScore);
}

// =============================================
// SCORE PAGE
// =============================================
function showScorePage(score) {
  var s = score;

  var key = currentLetter.toUpperCase();
  var prev = state.bestScores[key] || 0;
  if (s > prev) state.bestScores[key] = s;
  state.totalAttempts = (state.totalAttempts || 0) + 1;
  var gotStreak = s >= 90;
  if (gotStreak) {
    state.streak = (state.streak || 0) + 1;
    if (state.streak > (state.maxStreak||0)) state.maxStreak = state.streak;
  } else {
    state.streak = 0;
  }
  saveState(state);

  document.getElementById('scoreLetterDisplay').textContent = currentLetter.toUpperCase();

  var starsRow = document.getElementById('starsRow');
  var goldCount = 0;
  if (s >= 90) goldCount = 3;
  else if (s >= 70) goldCount = 2;
  else if (s >= 50) goldCount = 1;

  starsRow.innerHTML = '';
  for (var i = 0; i < 3; i++) {
    var span = document.createElement('span');
    span.className = 'star';
    if (i < goldCount) {
      span.classList.add('gold');
      span.textContent = '⭐';
    } else {
      span.classList.add('gray');
      span.textContent = '☆';
    }
    starsRow.appendChild(span);
  }

  var emojiMap = {3:'😎', 2:'🙂', 1:'😅', 0:'😤'};
  document.getElementById('scoreBigEmoji').textContent = emojiMap[goldCount];

  var flamePlus = document.getElementById('flamePlus');
  if (gotStreak) {
    flamePlus.classList.remove('hidden');
  } else {
    flamePlus.classList.add('hidden');
  }

  var dlg = CHAR_DIALOGUES[currentLetter.toUpperCase()];
  var tier = s >= 90 ? 90 : s >= 70 ? 70 : s >= 50 ? 50 : 0;
  var line = dlg ? dlg[tier] : '再来一次吧！';
  document.getElementById('charBubble').textContent = line;
  document.getElementById('charAvatar').textContent = LETTER_EMOJIS[currentLetter.toUpperCase()] || currentLetter;

  showPage('p3');

  if (s >= 90) {
    redrawCanvas();
    ctx.clearRect(0, 0, canvasSize, canvasSize);
    drawGridLines();
    drawGuide();
    drawUserStrokes(true);
    spawnStars();
    var allUnlocked = LETTERS.every(function(l) { return (state.bestScores[l.toUpperCase()]||0) >= 90; });
    if (allUnlocked) setTimeout(function() { showUnlockPage(); }, 1500);
  }
}

function spawnStars() {
  var cx = window.innerWidth/2;
  var cy = window.innerHeight/3;
  var ems = ['⭐','🌟','✨','💫','🎉'];
  for (var i = 0; i < 14; i++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'star-particle';
        el.textContent = ems[idx%ems.length];
        var angle = (idx/14)*Math.PI*2;
        var dist = 80 + Math.random()*60;
        el.style.left = cx+'px';
        el.style.top = cy+'px';
        el.style.setProperty('--dx', Math.cos(angle)*dist+'px');
        el.style.setProperty('--dy', Math.sin(angle)*dist+'px');
        el.style.animationDelay = (idx*0.06)+'s';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1400);
      }, idx*60);
    })(i);
  }
}

function retryLetter() { startLetter(currentLetter); }
function nextLetter() {
  var idx = LETTERS.indexOf(currentLetter.toUpperCase());
  startLetter(LETTERS[(idx+1)%LETTERS.length]);
}

// =============================================
// UNLOCK PAGE
// =============================================
function showUnlockPage() {
  var days = Math.ceil((Date.now()-(state.startDate||Date.now()))/86400000);
  document.getElementById('achStreak').textContent = state.maxStreak||0;
  document.getElementById('achTotal').textContent = state.totalAttempts||0;
  document.getElementById('achDays').textContent = Math.max(1,days);
  showPage('p4');
  spawnConfetti();
}

function spawnConfetti() {
  var colors = ['#FF6B6B','#FFC800','#58CC02','#4ECDC4','#D8C7EF','#FFB3BB'];
  for (var i = 0; i < 60; i++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random()*100+'vw';
        el.style.top = '-10px';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.borderRadius = Math.random()>0.5?'50%':'2px';
        el.style.animationDuration = (1.5+Math.random()*2)+'s';
        el.style.animationDelay = Math.random()*0.5+'s';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 3500);
      }, idx*30);
    })(i);
  }
}

// =============================================
// STATS POPUP
// =============================================
document.getElementById('medalBtn').onclick = function() { openStats(); };
document.getElementById('flameBtn').onclick = function() { openStats(); };

function openStats() {
  var completed = LETTERS.filter(function(l) { return (state.bestScores[l.toUpperCase()]||0) >= 90; });
  var total = LETTERS.reduce(function(a,l) { return a+(state.bestScores[l.toUpperCase()]||0); }, 0);
  var avgScore = total / 26;
  var html = '';
  html += '<div class="popup-row"><span>⭐ 满分字母</span><span class="val">' + completed.length + '/26</span></div>';
  html += '<div class="popup-row"><span>🔥 当前连胜</span><span class="val">' + state.streak + '</span></div>';
  html += '<div class="popup-row"><span>🏆 最高连胜</span><span class="val">' + (state.maxStreak||0) + '</span></div>';
  html += '<div class="popup-row"><span>📈 平均分</span><span class="val">' + Math.round(avgScore) + '</span></div>';
  html += '<div class="popup-row"><span>✍️ 总练习次数</span><span class="val">' + (state.totalAttempts||0) + '</span></div>';
  if (completed.length) {
    html += '<div class="popup-row"><span>🌟 已解锁</span><span class="val" style="font-size:13px">' + completed.join(' ') + '</span></div>';
  }
  document.getElementById('popupContent').innerHTML = html;
  document.getElementById('statsPopup').classList.add('open');
}

function closeStats() { document.getElementById('statsPopup').classList.remove('open'); }

document.getElementById('statsPopup').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeStats();
});

// =============================================
// TOAST
// =============================================
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// =============================================
// DEMO MODE (?demo=auto)
// =============================================
var isDemo = new URLSearchParams(location.search).get('demo') === 'auto';
var DEMO_LETTERS = ['A','O','S','B','T','Z','G'];
var demoIdx = 0;
var demoRunning = false;
var demoModeTimeouts = [];

function startDemoMode() {
  document.getElementById('demoBadge').style.display = 'block';
  demoRunning = true;
  demoIdx = 0;
  runNextDemo();
}

function runNextDemo() {
  if (!demoRunning) return;
  var letterKey = DEMO_LETTERS[demoIdx % DEMO_LETTERS.length];
  demoIdx++;
  startLetter(letterKey);

  var t = setTimeout(function() {
    clearCanvas();
    var strokes = getCurrentStrokes();
    if (!strokes.length) { runNextDemo(); return; }
    userStrokes = [];
    var delay = 0;
    strokes.forEach(function(pathStr) {
      var pts = samplePath(pathStr, 30);
      (function(p, d) {
        demoModeTimeouts.push(setTimeout(function() {
          var stroke = p.map(function(pt) {
            return { x: pt.x+(Math.random()-0.5)*6, y: pt.y+(Math.random()-0.5)*6 };
          });
          userStrokes.push(stroke);
          redrawCanvas();
        }, d));
      })(pts, delay);
      delay += pts.length * 18 + 300;
    });
    (function(d) {
      demoModeTimeouts.push(setTimeout(function() {
        submitDrawing();
        demoModeTimeouts.push(setTimeout(function() { runNextDemo(); }, 3200));
      }, d + 400));
    })(delay);
  }, 1500);
  demoModeTimeouts.push(t);
}

// =============================================
// WINDOW RESIZE
// =============================================
window.addEventListener('resize', function() {
  if (document.getElementById('p2').classList.contains('active')) {
    resizeCanvas();
    renderStrokeLabels();
  }
});

// =============================================
// INIT
// =============================================
buildGrid();
updateStatusBar();
if (isDemo) setTimeout(function() { startDemoMode(); }, 800);
