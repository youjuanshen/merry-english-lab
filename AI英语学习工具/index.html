<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>AI 英语学习工具 · Merry 老师</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-green: #58CC02;
      --brand-green-dark: #46A300;
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #555555;
      --text-muted: #999999;
      --border-placeholder: #E5E5E5;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 24px;
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* BACK BAR */
    .back-bar {
      width: 100%;
      max-width: 720px;
      padding: 16px 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-bar a {
      color: var(--brand-green-dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 6px 14px;
      border-radius: 12px;
      background: #E8F9D6;
      transition: background 0.15s ease;
    }
    .back-bar a:hover { background: #D6F0C0; }
    .breadcrumb { font-size: 0.85rem; color: var(--text-muted); }
    @media (max-width: 480px) { .breadcrumb { display: none; } }

    /* HERO */
    .hero {
      width: 100%;
      text-align: center;
      padding: 48px 24px 40px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--brand-green);
      color: #fff;
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border-radius: 999px;
      padding: 6px 18px;
      margin-bottom: 20px;
    }
    .hero-title {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .hero-subtitle {
      font-size: clamp(1rem, 3vw, 1.15rem);
      font-weight: 700;
      color: var(--brand-green);
    }

    /* TOOLS SECTION */
    .tools-section {
      width: 100%;
      max-width: 560px;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ACTIVE CARD */
    .tool-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }
    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }
    .tool-card:active { transform: translateY(0); }

    .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .card-tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--brand-green-dark);
      background: #E8F9D6;
      border-radius: 999px;
      padding: 3px 12px;
    }
    .card-tag-lesson { color: #666; background: #F0F0F0; }

    .card-title {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text-primary);
    }
    .card-desc { font-size: 1rem; color: var(--text-secondary); line-height: 1.6; }

    .card-btn {
      display: inline-block;
      background: var(--brand-green);
      color: #fff;
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 16px;
      padding: 12px 24px;
      text-align: center;
      text-decoration: none;
      margin-top: 4px;
      transition: background 0.15s ease;
      align-self: flex-start;
    }
    .card-btn:hover { background: var(--brand-green-dark); }

    /* PLACEHOLDER CARD */
    .tool-card-placeholder {
      background: transparent;
      border: 2px dashed var(--border-placeholder);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-title-placeholder {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #BBBBBB;
    }
    .card-desc-placeholder { font-size: 1rem; color: #CCCCCC; line-height: 1.6; }
    .card-tag-placeholder {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 700;
      color: #CCCCCC;
      background: #F0F0F0;
      border-radius: 999px;
      padding: 4px 14px;
      align-self: flex-start;
    }

    /* FOOTER */
    footer {
      width: 100%;
      text-align: center;
      padding: 32px 24px 48px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid #EFEFEF;
      margin-top: auto;
    }
    footer strong { color: var(--text-secondary); }

    @media (max-width: 400px) {
      .hero { padding: 32px 16px 28px; }
      .tools-section { padding: 0 16px 64px; }
      .tool-card, .tool-card-placeholder { padding: 24px; }
      .card-btn { align-self: stretch; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- 返回栏 -->
  <nav class="back-bar">
    <a href="../">&larr; 返回首页</a>
    <span class="breadcrumb">首页 / AI英语学习工具</span>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge">AI 工具集</div>
    <h1 class="hero-title">AI 英语学习工具</h1>
    <p class="hero-subtitle">Merry 老师自创游戏</p>
  </section>

  <!-- 工具列表 -->
  <main class="tools-section">

    <!-- 字母快乐谷 -->
    <a class="tool-card" href="./字母快乐谷/">
      <div class="card-tags">
        <span class="card-tag">AI 工具</span>
        <span class="card-tag card-tag-lesson">字母教学</span>
      </div>
      <div class="card-title">字母快乐谷</div>
      <div class="card-desc">26 个英文字母闯关游戏，认读、配对、书写一套搞定</div>
      <span class="card-btn">开始玩 &rarr;</span>
    </a>

    <!-- 字母大冒险 -->
    <a class="tool-card" href="./字母大冒险/">
      <div class="card-tags">
        <span class="card-tag">AI 工具</span>
        <span class="card-tag card-tag-lesson">易混字母</span>
      </div>
      <div class="card-title">字母大冒险</div>
      <div class="card-desc">26 字母瀑布反应力训练，专治 b/d/p/q、l/I 镜像混淆</div>
      <span class="card-btn">开始玩 &rarr;</span>
    </a>

    <!-- 占位 -->
    <div class="tool-card-placeholder">
      <div class="card-title-placeholder">更多 AI 工具开发中...</div>
      <div class="card-desc-placeholder">Merry 老师持续研发中，敬请期待</div>
      <span class="card-tag-placeholder">即将上线</span>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p><strong>Merry 老师</strong> &nbsp;&middot;&nbsp; 教育博士在读 &nbsp;&middot;&nbsp; 持续更新中</p>
    <p style="margin-top:8px;">抖音 / 小红书 搜 <strong>Merry 老师英语</strong></p>
  </footer>

</body>
</html>
