<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>六年级下册 · 闽教版 · Merry 老师</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-green: #58CC02; --brand-green-dark: #46A300;
      --bg: #FAFAFA; --card-bg: #FFFFFF;
      --text-primary: #1A1A1A; --text-secondary: #555555; --text-muted: #999999;
      --border-placeholder: #E5E5E5; --shadow: 0 8px 24px rgba(0,0,0,0.08); --radius: 24px;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background-color: var(--bg); color: var(--text-primary);
      font-family: 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .back-bar {
      width: 100%; max-width: 720px; padding: 16px 24px 0;
      display: flex; align-items: center; gap: 12px;
    }
    .back-bar a {
      color: var(--brand-green-dark); text-decoration: none; font-weight: 700;
      font-size: 0.95rem; padding: 6px 14px; border-radius: 12px;
      background: #E8F9D6; transition: background 0.15s ease;
    }
    .back-bar a:hover { background: #D6F0C0; }
    .breadcrumb { font-size: 0.85rem; color: var(--text-muted); }
    @media (max-width: 480px) { .breadcrumb { display: none; } }
    .hero { width: 100%; text-align: center; padding: 48px 24px 40px; }
    .hero-badge {
      display: inline-block; background: var(--brand-green); color: #fff;
      font-family: 'Manrope', 'Noto Sans SC', sans-serif; font-size: 13px;
      font-weight: 700; letter-spacing: 0.08em; border-radius: 999px;
      padding: 6px 18px; margin-bottom: 20px;
    }
    .hero-title {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 800;
      line-height: 1.2; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 10px;
    }
    .hero-subtitle { font-size: clamp(1rem, 3vw, 1.15rem); font-weight: 700; color: var(--brand-green); }
    .tools-section {
      width: 100%; max-width: 560px; padding: 0 24px 80px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .tool-card-placeholder {
      background: transparent; border: 2px dashed var(--border-placeholder);
      border-radius: var(--radius); padding: 48px 32px;
      display: flex; flex-direction: column; gap: 16px; align-items: center; text-align: center;
    }
    .card-title-placeholder {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1.5rem; font-weight: 700; color: #BBBBBB;
    }
    .card-desc-placeholder { font-size: 1rem; color: #CCCCCC; line-height: 1.6; }
    footer {
      width: 100%; text-align: center; padding: 32px 24px 48px;
      font-size: 0.9rem; color: var(--text-muted);
      border-top: 1px solid #EFEFEF; margin-top: auto;
    }
    footer strong { color: var(--text-secondary); }
  </style>
</head>
<body>

  <nav class="back-bar">
    <a href="../">&larr; 返回闽教版</a>
    <span class="breadcrumb">首页 / 课程教材 / 闽教版 / 六年级下册</span>
  </nav>

  <section class="hero">
    <div class="hero-badge">闽教版</div>
    <h1 class="hero-title">六年级下册</h1>
    <p class="hero-subtitle">闽教版 · 福建省小学英语</p>
  </section>

  <main class="tools-section">
    <div class="tool-card-placeholder">
      <div class="card-title-placeholder">内容建设中...</div>
      <div class="card-desc-placeholder">
        这个学期还没有上线工具<br>
        建议你先看 <a href="../三年级上册/" style="color: var(--brand-green-dark); font-weight: 700;">三年级上册</a>
      </div>
    </div>
  </main>

  <footer>
    <p><strong>Merry 老师</strong> &nbsp;&middot;&nbsp; 教育博士在读 &nbsp;&middot;&nbsp; 持续更新中</p>
    <p style="margin-top:8px;">抖音 / 小红书 搜 <strong>Merry 老师英语</strong></p>
  </footer>

</body>
</html>
