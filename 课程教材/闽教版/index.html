<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>闽教版 · Merry 老师</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-green: #58CC02;
      --brand-green-dark: #46A300;
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #555555;
      --text-muted: #999999;
      --border-placeholder: #E5E5E5;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 24px;
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .back-bar {
      width: 100%;
      max-width: 720px;
      padding: 16px 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-bar a {
      color: var(--brand-green-dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 6px 14px;
      border-radius: 12px;
      background: #E8F9D6;
      transition: background 0.15s ease;
    }
    .back-bar a:hover { background: #D6F0C0; }
    .breadcrumb { font-size: 0.85rem; color: var(--text-muted); }
    @media (max-width: 480px) { .breadcrumb { display: none; } }

    .hero {
      width: 100%;
      text-align: center;
      padding: 48px 24px 40px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--brand-green);
      color: #fff;
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border-radius: 999px;
      padding: 6px 18px;
      margin-bottom: 20px;
    }
    .hero-title {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .hero-subtitle {
      font-size: clamp(1rem, 3vw, 1.15rem);
      font-weight: 700;
      color: var(--brand-green);
    }

    /* 2 列卡片网格 */
    .semester-grid {
      width: 100%;
      max-width: 720px;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* 有内容的学期卡片 */
    .semester-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .semester-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    /* 占位学期卡片 */
    .semester-card-placeholder {
      background: transparent;
      border: 2px dashed var(--border-placeholder);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .semester-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--brand-green-dark);
      background: #E8F9D6;
      border-radius: 999px;
      padding: 3px 12px;
      align-self: flex-start;
    }
    .semester-label-pending {
      font-size: 0.78rem;
      font-weight: 700;
      color: #CCCCCC;
      background: #F0F0F0;
      border-radius: 999px;
      padding: 3px 12px;
      align-self: flex-start;
    }

    .semester-title {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    .semester-title-placeholder {
      font-family: 'Manrope', 'Noto Sans SC', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #BBBBBB;
    }

    .semester-btn {
      display: inline-block;
      background: var(--brand-green);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 12px;
      padding: 8px 18px;
      text-decoration: none;
      align-self: flex-start;
      margin-top: 4px;
      transition: background 0.15s ease;
    }
    .semester-btn:hover { background: var(--brand-green-dark); }

    footer {
      width: 100%;
      text-align: center;
      padding: 32px 24px 48px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid #EFEFEF;
      margin-top: auto;
    }
    footer strong { color: var(--text-secondary); }

    @media (max-width: 600px) {
      .semester-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 400px) {
      .hero { padding: 32px 16px 28px; }
      .semester-grid { padding: 0 16px 64px; }
    }
  </style>
</head>
<body>

  <nav class="back-bar">
    <a href="../">&larr; 返回课程教材</a>
    <span class="breadcrumb">首页 / 课程教材 / 闽教版</span>
  </nav>

  <section class="hero">
    <div class="hero-badge">福建省小学英语教材</div>
    <h1 class="hero-title">闽教版</h1>
    <p class="hero-subtitle">福建省小学英语教材 · 3-6 年级</p>
  </section>

  <main class="semester-grid">

    <!-- 三年级上册（有内容） -->
    <a class="semester-card" href="./三年级上册/">
      <span class="semester-label">2 课上线</span>
      <div class="semester-title">三年级上册</div>
      <span class="semester-btn">进入 &rarr;</span>
    </a>

    <!-- 三年级下册（待上线） -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">三年级下册</div>
    </div>

    <!-- 四年级上册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">四年级上册</div>
    </div>

    <!-- 四年级下册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">四年级下册</div>
    </div>

    <!-- 五年级上册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">五年级上册</div>
    </div>

    <!-- 五年级下册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">五年级下册</div>
    </div>

    <!-- 六年级上册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">六年级上册</div>
    </div>

    <!-- 六年级下册 -->
    <div class="semester-card-placeholder">
      <span class="semester-label-pending">待上线</span>
      <div class="semester-title-placeholder">六年级下册</div>
    </div>

  </main>

  <footer>
    <p><strong>Merry 老师</strong> &nbsp;&middot;&nbsp; 教育博士在读 &nbsp;&middot;&nbsp; 持续更新中</p>
    <p style="margin-top:8px;">抖音 / 小红书 搜 <strong>Merry 老师英语</strong></p>
  </footer>

</body>
</html>
